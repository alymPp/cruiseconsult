<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZIZKAN Mobile Fit Shop</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:#f7f7f8;--text:#111;--muted:#7a7a7a;--line:#ececef;--card:#fff;--black:#090909;--soft:#f2f2f3}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;background:#050505;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
    .phone{width:390px;height:844px;background:var(--bg);border-radius:42px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25)}
    .screen{position:absolute;inset:0;background:var(--bg);display:none;overflow:hidden}.screen.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:.35;transform:translateY(8px)}to{opacity:1;transform:none}}
    .status{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:14px;font-weight:800}.status-icons{font-size:13px;letter-spacing:1px}
    .top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.logo{font-size:19px;font-weight:900;letter-spacing:2.5px}.title{font-size:18px;font-weight:900}.top-left,.top-right{display:flex;align-items:center;gap:10px}.round{width:44px;height:44px;border:0;border-radius:16px;background:#fff;box-shadow:0 10px 28px rgba(0,0,0,.06);font-size:18px;position:relative}.back{border:0;background:transparent;font-size:28px}.badge{position:absolute;top:-3px;right:-3px;background:#111;color:#fff;border-radius:99px;min-width:19px;height:19px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:900}
    /* HOME */
    .home-stage{position:absolute;left:0;right:0;top:100px;bottom:0;background:radial-gradient(circle at 50% 36%,#fff 0,#f1f1f2 52%,#eeeeef 100%)}
    .avatar-img{position:absolute;left:50%;top:16px;width:250px;height:535px;transform:translateX(-50%);object-fit:cover;object-position:center;border-radius:28px;mix-blend-mode:multiply;filter:contrast(1.03) saturate(.95);animation:float 4s ease-in-out infinite}@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}
    .vertical-menu{position:absolute;left:18px;top:135px;display:flex;flex-direction:column;gap:12px;z-index:5}.vbtn{width:72px;height:72px;border:0;border-radius:16px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:800}.vbtn span{font-size:21px}.vbtn.active{background:#111;color:#fff}
    .side-actions{position:absolute;right:18px;top:380px;display:flex;flex-direction:column;gap:12px}.action-box{width:70px;height:70px;border:0;border-radius:16px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:800}.action-box span{font-size:24px}
    .look-strip{position:absolute;left:54px;right:22px;bottom:36px;display:flex;gap:13px;z-index:8}.look-mini{width:72px;height:82px;border:1px solid transparent;border-radius:15px;background:#fff;padding:3px;box-shadow:0 8px 20px rgba(0,0,0,.04)}.look-mini img{width:100%;height:100%;object-fit:cover;border-radius:12px}.look-mini.active{border-color:#111}
    /* SHOP */
    .tabs{display:flex;gap:26px;padding:0 22px;height:45px;align-items:flex-end;border-bottom:1px solid var(--line);overflow-x:auto}.tab{border:0;background:transparent;padding:0 0 12px;font-size:15px;color:#777;white-space:nowrap}.tab.active{color:#111;font-weight:900;border-bottom:2px solid #111}
    .grid{height:699px;overflow-y:auto;padding:20px 18px 100px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.product{border:0;background:transparent;text-align:left;position:relative}.pimg{height:170px;border-radius:18px;background:#fff;overflow:hidden;margin-bottom:10px;box-shadow:0 8px 25px rgba(0,0,0,.035)}.pimg img{width:100%;height:100%;object-fit:cover}.product h3{font-size:13px;margin-bottom:3px}.product p{font-size:12px;color:#777}.check{position:absolute;top:11px;right:11px;width:27px;height:27px;border-radius:50%;background:#111;color:#fff;display:none;align-items:center;justify-content:center;font-size:15px}.product.selected .check{display:flex}.swatches{display:flex;gap:8px;margin-top:9px}.sw{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.12)}
    /* PRODUCT SHEET */
    .sheet-img{height:335px;display:flex;align-items:center;justify-content:center;background:linear-gradient(#fafafa,#f1f1f2);padding-top:15px}.sheet-img img{max-width:78%;height:270px;object-fit:cover;border-radius:24px;box-shadow:0 18px 45px rgba(0,0,0,.08)}.sheet-card{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:28px 28px 0 0;padding:25px 22px 24px;box-shadow:0 -20px 60px rgba(0,0,0,.08)}.grab{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:44px;height:4px;border-radius:99px;background:#d9d9d9}.sheet-card h2{font-size:19px;margin-bottom:8px}.price{font-weight:900;margin-bottom:24px}.label{font-size:14px;font-weight:800;margin:18px 0 11px}.colors{display:flex;gap:12px}.color{width:32px;height:32px;border-radius:50%;border:4px solid #fff;outline:1px solid transparent;background:var(--c);box-shadow:0 5px 14px rgba(0,0,0,.1)}.color.active{outline-color:#111}.sizes{display:flex;gap:11px}.size{width:45px;height:38px;border-radius:11px;border:1px solid #ddd;background:#fff;font-weight:800}.size.active{background:#111;color:#fff;border-color:#111}.big-btn{width:100%;height:54px;border:0;border-radius:13px;background:#111;color:#fff;font-weight:900;font-size:14px;margin-top:24px}.outline-btn{width:100%;height:54px;border:1px solid #e4e4e6;border-radius:13px;background:#fff;font-weight:900;font-size:14px;margin-top:11px}
    /* FIT */
    .fit-list{padding:18px 22px 0;height:588px;overflow-y:auto}.fit-row{display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line);padding:14px 0}.fit-row img{width:64px;height:64px;border-radius:14px;object-fit:cover;background:#f5f5f5}.fit-row-info{flex:1}.fit-row h4{font-size:13px;margin-bottom:4px}.fit-row p{font-size:12px;color:#777;line-height:1.45}.fit-row strong{font-size:12px;font-weight:500;color:#555;margin-right:9px}.x{border:0;background:transparent;font-size:20px;color:#555}.fit-total{position:absolute;left:22px;right:22px;bottom:86px}.total-line{display:flex;justify-content:space-between;font-size:18px;font-weight:900;margin-bottom:16px}.share-btn{width:100%;height:50px;border-radius:13px;border:1px solid #e5e5e5;background:#fff;font-weight:900;margin-top:11px}
    .bottom-nav{position:absolute;left:0;right:0;bottom:0;height:76px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center}.bn{border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#777;font-weight:700}.bn span{font-size:21px}.bn.active{color:#111}.bn.active:after{content:"";width:5px;height:5px;border-radius:50%;background:#111;margin-top:1px}
    .empty{color:#777;font-size:14px;line-height:1.5;padding:30px 8px}
  </style>
</head>
<body>
  <div class="phone">
    <section class="screen active" id="homeScreen">
      <div class="status"><span>9:41</span><span class="status-icons">▮▮▮ ϟ ▰</span></div>
      <div class="top"><div class="logo">AZIZKAN</div><div class="top-actions"><button class="round" onclick="showScreen('fitScreen')">⌘<span class="badge cartCount">0</span></button><button class="round">☰</button></div></div>
      <div class="home-stage">
        <img class="avatar-img" id="mainLookImg" src="" alt="Look">
        <div class="vertical-menu">
          <button class="vbtn active"><span>♙</span>Outfit</button><button class="vbtn" onclick="showScreen('shopScreen')"><span>♕</span>Tops</button><button class="vbtn" onclick="showScreen('shopScreen')"><span>▥</span>Bottoms</button><button class="vbtn" onclick="showScreen('shopScreen')"><span>◒</span>Shoes</button><button class="vbtn"><span>♧</span>Access.</button>
        </div>
        <div class="side-actions"><button class="action-box"><span>♡</span>Save</button><button class="action-box"><span>⇧</span>Share</button></div>
        <div class="look-strip" id="lookStrip"></div>
      </div>
      <nav class="bottom-nav"><button class="bn active" onclick="showScreen('homeScreen')"><span>⌂</span>Home</button><button class="bn" onclick="showScreen('shopScreen')"><span>◒</span>Shop</button><button class="bn" onclick="showScreen('fitScreen')"><span>▱</span>My Fits</button><button class="bn"><span>♙</span>Account</button></nav>
    </section>

    <section class="screen" id="shopScreen">
      <div class="status"><span>9:41</span><span class="status-icons">▮▮▮ ϟ ▰</span></div>
      <div class="top"><button class="back" onclick="showScreen('homeScreen')">‹</button><div class="title">Tops</div><button class="round" style="width:76px;border-radius:15px;font-size:13px">☷ Filter</button></div>
      <div class="tabs"><button class="tab active">Hoodies</button><button class="tab">T-Shirts</button><button class="tab">Jackets</button><button class="tab">Sweatshirts</button></div>
      <div class="grid" id="productGrid"></div>
      <nav class="bottom-nav"><button class="bn" onclick="showScreen('homeScreen')"><span>⌂</span>Home</button><button class="bn active" onclick="showScreen('shopScreen')"><span>◒</span>Shop</button><button class="bn" onclick="showScreen('fitScreen')"><span>▱</span>My Fits</button><button class="bn"><span>♙</span>Account</button></nav>
    </section>

    <section class="screen" id="productScreen">
      <div class="status"><span>9:41</span><span class="status-icons">▮▮▮ ϟ ▰</span></div>
      <div class="sheet-img"><img id="sheetImage" src="" alt="Product"></div>
      <button class="round" style="position:absolute;right:22px;top:86px">♡</button>
      <div class="sheet-card"><div class="grab"></div><h2 id="sheetName">Hoodie Essentials</h2><p class="price" id="sheetPrice">120 USD</p><p class="label">Color</p><div class="colors" id="colorsBox"></div><p class="label">Size</p><div class="sizes" id="sizesBox"></div><button class="big-btn" onclick="addCurrentItem()">Add to Fit</button><button class="outline-btn" onclick="showScreen('shopScreen')">View Details →</button></div>
    </section>

    <section class="screen" id="fitScreen">
      <div class="status"><span>9:41</span><span class="status-icons">▮▮▮ ϟ ▰</span></div>
      <div class="top"><button class="back" onclick="showScreen('homeScreen')">‹</button><div class="title">My Fit</div><div class="top-right"><button class="round">▱<span class="badge cartCount">0</span></button></div></div>
      <div class="fit-list" id="fitList"></div>
      <div class="fit-total"><div class="total-line"><span>Total</span><strong id="totalPrice">0 USD</strong></div><button class="big-btn">▱ Save Fit</button><button class="share-btn">⇧ Share Fit</button></div>
      <nav class="bottom-nav"><button class="bn" onclick="showScreen('homeScreen')"><span>⌂</span>Home</button><button class="bn" onclick="showScreen('shopScreen')"><span>◒</span>Shop</button><button class="bn active" onclick="showScreen('fitScreen')"><span>▱</span>My Fits</button><button class="bn"><span>♙</span>Account</button></nav>
    </section>
  </div>

  <script>
    const looks=[
      {name:'Black Fit',img:'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=700&q=85'},
      {name:'Grey Fit',img:'https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=700&q=85'},
      {name:'Cream Fit',img:'https://images.unsplash.com/photo-1506629905607-d405d7d3b0d2?auto=format&fit=crop&w=700&q=85'},
      {name:'Olive Fit',img:'https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=700&q=85'}
    ];
    const products=[
      {id:'hoodie1',name:'Hoodie Essentials',price:120,sub:'Black / S',img:'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=85',colors:['#050505','#aaa','#eadfca','#2f372b','#69422f'],sizes:['XS','S','M','L','XL']},
      {id:'hoodie2',name:'Logo Hoodie',price:110,sub:'Grey / M',img:'https://images.unsplash.com/photo-1578587018452-892bacefd3f2?auto=format&fit=crop&w=500&q=85',colors:['#999','#ddd','#050505','#4a5343'],sizes:['XS','S','M','L','XL']},
      {id:'hoodie3',name:'Minimal Hoodie',price:115,sub:'Cream / S',img:'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&w=500&q=85',colors:['#eadfca','#ddd','#050505','#4a5343'],sizes:['XS','S','M','L']},
      {id:'hoodie4',name:'Tech Hoodie',price:130,sub:'Black / M',img:'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=85&sat=-100',colors:['#999','#050505','#6b625a'],sizes:['S','M','L','XL']},
      {id:'pants1',name:'Cargo Pants',price:110,sub:'Black / M',img:'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?auto=format&fit=crop&w=500&q=85',colors:['#050505','#333','#4a5343'],sizes:['S','M','L','XL']},
      {id:'shoes1',name:'Air Jordan 1',price:150,sub:'Black / 42',img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=85',colors:['#050505','#fff','#aaa'],sizes:['40','41','42','43','44']},
      {id:'glass1',name:'Sunglasses',price:90,sub:'Black',img:'https://images.unsplash.com/photo-1511499767150-a48a237f0083?auto=format&fit=crop&w=500&q=85',colors:['#050505','#5d3d2e'],sizes:['One']}
    ];
    let current=products[0],color=0,size=1,fit=JSON.parse(localStorage.getItem('fit_cart'))||[products[0],products[4],products[5],products[6]];
    function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');renderFit()}
    function save(){localStorage.setItem('fit_cart',JSON.stringify(fit));renderFit()}
    function renderLooks(){mainLookImg.src=looks[0].img;lookStrip.innerHTML=looks.map((l,i)=>`<button class="look-mini ${i===0?'active':''}" onclick="selectLook(${i},this)"><img src="${l.img}"></button>`).join('')}
    function selectLook(i,el){mainLookImg.src=looks[i].img;document.querySelectorAll('.look-mini').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
    function renderProducts(){productGrid.innerHTML=products.slice(0,6).map((p,i)=>`<button class="product ${i===0?'selected':''}" onclick="openProduct('${p.id}')"><span class="check">✓</span><div class="pimg"><img src="${p.img}"></div><h3>${p.name}</h3><p>${p.price} USD</p><div class="swatches">${p.colors.slice(0,5).map(c=>`<span class="sw" style="background:${c}"></span>`).join('')}</div></button>`).join('')}
    function openProduct(id){current=products.find(p=>p.id===id);color=0;size=Math.min(1,current.sizes.length-1);renderSheet();showScreen('productScreen')}
    function renderSheet(){sheetImage.src=current.img;sheetName.textContent=current.name;sheetPrice.textContent=current.price+' USD';colorsBox.innerHTML=current.colors.map((c,i)=>`<button class="color ${i===color?'active':''}" style="--c:${c}" onclick="color=${i};renderSheet()"></button>`).join('');sizesBox.innerHTML=current.sizes.map((s,i)=>`<button class="size ${i===size?'active':''}" onclick="size=${i};renderSheet()">${s}</button>`).join('')}
    function addCurrentItem(){fit.push({...current,chosenColor:current.colors[color],chosenSize:current.sizes[size]});save();showScreen('fitScreen')}
    function removeItem(i){fit.splice(i,1);save()}
    function renderFit(){fitList.innerHTML=fit.length?fit.map((p,i)=>`<div class="fit-row"><img src="${p.img}"><div class="fit-row-info"><h4>${p.name}</h4><p>${p.sub||''}<br>${p.price} USD</p></div><strong>${p.price} USD</strong><button class="x" onclick="removeItem(${i})">×</button></div>`).join(''):'<p class="empty">Пока пусто. Добавь полный лук или отдельную вещь.</p>';let total=fit.reduce((s,p)=>s+Number(p.price),0);totalPrice.textContent=total+' USD';document.querySelectorAll('.cartCount').forEach(e=>e.textContent=fit.length)}
    renderLooks();renderProducts();renderSheet();renderFit();
  </script>
</body>
</html>
